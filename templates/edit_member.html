{% extends "adminlayout.html" %}
{% block title %}Edit Member{% endblock %}
{% block content %}

<div class="container mt-5">
    <h3 class="text-center text-primary mb-4">Edit Member</h3>

    <form method="POST" action="">
        <div class="mb-3">
            <label class="form-label">Member ID</label>
            <input type="text" class="form-control" name="memberid" value="{{ member.memberid }}" readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="text" class="form-control" name="password" value="{{ member.password }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" name="name" value="{{ member.name }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mobile</label>
            <input type="text" class="form-control" name="mobile" value="{{ member.mobile }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea class="form-control" name="address" required>{{ member.address }}</textarea>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-success px-4">Update Member</button>
            <a href="{{ url_for('view_members') }}" class="btn btn-secondary px-4">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
